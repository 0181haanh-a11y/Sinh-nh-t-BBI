<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinh nhat Khang</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
}

.slider{
  display:flex;
  width:500%;
  height:100vh;
  transition:transform 0.9s ease-in-out;
}

.slide{
  width:100vw;
  height:100vh;
  flex-shrink:0;
  position:relative;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.nav-btn{
  position:fixed;
  bottom:40px;
  right:40px;
  padding:14px 28px;
  border:none;
  border-radius:30px;
  background:white;
  cursor:pointer;
  font-size:16px;
  z-index:1000;
  transition:0.3s;
}

.nav-btn:hover{
  background:#eee;
}
</style>
</head>

<body>

<div class="slider" id="slider">

  <div class="slide">
    <iframe src="page1.html"></iframe>
  </div>

  <div class="slide">
    <iframe src="page2.html"></iframe>
  </div>

  <div class="slide">
    <iframe src="page3.html"></iframe>
  </div>

  <div class="slide">
    <iframe src="page4.html"></iframe>
  </div>

  <div class="slide">
    <iframe src="page5.html"></iframe>
  </div>

</div>

<button class="nav-btn" id="nextBtn">Trang tiếp theo ➜</button>

<script>
let currentIndex = 0;
const slider = document.getElementById("slider");
const totalSlides = 5;
const nextBtn = document.getElementById("nextBtn");

nextBtn.style.display = "none";

function goNext(){
  if(currentIndex < totalSlides - 1){
    currentIndex++;
    slider.style.transform = "translateX(-" + (currentIndex * 100) + "vw)";
    nextBtn.style.display = "none";
  }
}

nextBtn.onclick = goNext;

/* Lắng nghe tín hiệu từ từng page */
window.addEventListener("message", function(event){
    if(event.data === "unlock"){
        nextBtn.style.display = "block";
    }
});
</script>
</body>
</html>
