<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiệu ứng sao và bóng bay</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background-image:url("background6.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let balloons = [];


// ===== SAO 5 CÁNH BAY XUỐNG =====
function createStar(){
    return{
        x:Math.random()*canvas.width,
        y:-20,
        size:Math.random()*15+10,
        speed:Math.random()*2+1,
        rotation:Math.random()*Math.PI
    }
}

function drawStar(x,y,spikes,outerRadius,innerRadius,rotation){
    let rot = Math.PI / 2 * 3;
    let step = Math.PI / spikes;

    ctx.beginPath();
    ctx.moveTo(x, y - outerRadius);

    for(let i=0;i<spikes;i++){
        ctx.lineTo(
            x + Math.cos(rot+rotation) * outerRadius,
            y + Math.sin(rot+rotation) * outerRadius
        );
        rot += step;

        ctx.lineTo(
            x + Math.cos(rot+rotation) * innerRadius,
            y + Math.sin(rot+rotation) * innerRadius
        );
        rot += step;
    }

    ctx.lineTo(x, y - outerRadius);
    ctx.closePath();

    ctx.fillStyle = "rgba(255,255,200,0.9)";
    ctx.shadowColor = "#fff8b0";
    ctx.shadowBlur = 20;
    ctx.fill();
    ctx.shadowBlur = 0;
}


// ===== BÓNG BAY BAY LÊN =====
const balloonColors = [
    "#ffffff",
    "#a8f0df",
    "#5edbc1",
    "#d2fff3"
];

function createBalloon(){
    return{
        x:Math.random()*canvas.width,
        y:canvas.height + 50,
        radius:Math.random()*20+20,
        speed:Math.random()*1.5+0.5,
        color:balloonColors[Math.floor(Math.random()*balloonColors.length)]
    }
}

function drawBalloon(b){
    // thân bóng
    let gradient = ctx.createRadialGradient(
        b.x - b.radius/3,
        b.y - b.radius/3,
        b.radius/5,
        b.x,
        b.y,
        b.radius
    );

    gradient.addColorStop(0,"#ffffffaa");
    gradient.addColorStop(1,b.color);

    ctx.beginPath();
    ctx.ellipse(b.x,b.y,b.radius*0.8,b.radius,0,0,Math.PI*2);
    ctx.fillStyle = gradient;
    ctx.fill();

    // dây bóng
    ctx.beginPath();
    ctx.moveTo(b.x,b.y+b.radius);
    ctx.lineTo(b.x,b.y+b.radius+30);
    ctx.strokeStyle = "#cccccc";
    ctx.lineWidth = 1;
    ctx.stroke();
}


// tạo ban đầu
for(let i=0;i<30;i++){
    stars.push(createStar());
}

for(let i=0;i<20;i++){
    balloons.push(createBalloon());
}


// animation
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // sao rơi
    stars.forEach(s=>{
        drawStar(s.x,s.y,5,s.size,s.size/2,s.rotation);
        s.y += s.speed;
        s.rotation += 0.02;

        if(s.y > canvas.height+50){
            Object.assign(s,createStar());
        }
    });

    // bóng bay
    balloons.forEach(b=>{
        drawBalloon(b);
        b.y -= b.speed;

        if(b.y < -100){
            Object.assign(b,createBalloon());
        }
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
